name: Students Performance
version: '1.0'
domain: education
created: '2026-01-08'
intended_use: Analyse et recommandation des performances étudiantes
data_source: Collecté par enquêtes scolaires anonymisées
coverage: Étudiants — performances académiques
collection_method: Fichier fourni par un établissement éducatif
period_covered: Non temporel (instantané)
notes: 'Ce dataset est utilisé dans un cadre pédagogique pour analyser les scores

  en mathématiques, lecture et écriture, ainsi que les facteurs socio-éducatifs

  associés (repas, préparation, niveau d’éducation parentale, etc.)

  '
feature_cards:
  format: json
  directory: feature_cards/
  files:
    gender: feature_cards/gender.json
    race/ethnicity: feature_cards/race_ethnicity.json
    parental level of education: feature_cards/parental_level_of_education.json
    lunch: feature_cards/lunch.json
