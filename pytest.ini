[pytest]
markers =
    unit: Tests unitaires (forme, type, plage de valeurs)
    perf: Tests de performance globale (MAE, RMSE)
    business: Tests de logique métier (monotonie, cas d'usage)
    robustness: Tests de robustesse (bruit catégoriel, imputation, anomalies)
    load: Tests de charge et latence sous volume
    compare: Comparaison directe entre CatBoost et le second modèle
